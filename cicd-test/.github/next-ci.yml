name: Next.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code 📥
        uses: actions/checkout@v4

      - name: Install pnpm 📦
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Setup Node.js 🟩
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      # ✨ THE NEXT.JS MAGIC STEP ✨
      - name: Cache Next.js build space 💾
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install dependencies 🏗️
        run: pnpm install

      - name: Run linter 🧹
        run: pnpm run lint

      - name: Build Next.js app 🛠️
        run: pnpm run build